apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: tax-calculator
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: tax-calculator-web:latest
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              value: http://api:8080/api
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: tax-calculator
spec:
  selector:
    app: web
  ports:
    - port: 3000
